{% extends "base.html" %}
{% block titulo %}Historial de Ventas{% endblock %}
{% block contenido %}

<div class="row mb-4">
    <div class="col">
        <h4><i class="bi bi-graph-up"></i> Ventas del Día</h4>
    </div>
</div>

<!-- TARJETAS DE RESUMEN -->
<div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
        <div class="card text-center shadow-sm">
            <div class="card-body">
                <div class="fs-2">🧾</div>
                <h6 class="text-muted">Pedidos Hoy</h6>
                <h4 id="total-pedidos" class="fw-bold">0</h4>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card text-center shadow-sm">
            <div class="card-body">
                <div class="fs-2">💰</div>
                <h6 class="text-muted">Total Vendido</h6>
                <h4 id="total-vendido" class="fw-bold text-success">$0.00</h4>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card text-center shadow-sm">
            <div class="card-body">
                <div class="fs-2">🛵</div>
                <h6 class="text-muted">Deliveries</h6>
                <h4 id="total-delivery" class="fw-bold">0</h4>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card text-center shadow-sm">
            <div class="card-body">
                <div class="fs-2">🏪</div>
                <h6 class="text-muted">En Local</h6>
                <h4 id="total-local" class="fw-bold">0</h4>
            </div>
        </div>
    </div>
</div>

<!-- BOTON ULTIMO PEDIDO -->
<div class="row mb-3">
    <div class="col-12">
        <button class="btn btn-primary w-100 py-2 shadow-sm fw-bold" onclick="verUltimaVenta()">
            <i class="bi bi-eye"></i> Ver Detalle del Último Pedido
        </button>
    </div>
</div>

<!-- VENTAS COMPLETADAS -->
<div class="row">
    <div class="col">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <i class="bi bi-check-circle"></i> Ventas Completadas Hoy
            </div>
            <div class="card-body p-0">
                <div id="lista-ventas" class="list-group list-group-flush"></div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL DETALLE DE VENTA -->
<div class="modal fade" id="modal-detalle-venta" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title"><i class="bi bi-receipt"></i> Detalle de Venta</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0" id="contenido-detalle-venta">
                <!-- Se llena dinamicamente por JS -->
            </div>
            <div class="modal-footer bg-light border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>


{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/ventas.js') }}?v=2"></script>
{% endblock %}
