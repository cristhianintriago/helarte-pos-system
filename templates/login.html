<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helarte 🍦 - Iniciar Sesión</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"  
    />
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='img/logo.png') }}"
    />
    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='img/logo.png') }}"
    />
  </head>
  <body class="bg-light">
    <div class="min-vh-100 d-flex align-items-center justify-content-center">
      <div class="col-11 col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <div style="font-size: 3.5rem">🍦</div>
              <h4 class="fw-bold mt-2">Helarte</h4>
              <p class="text-muted small">Sistema de gestión</p>
            </div>

            <!-- Mensajes de error -->
            {% with mensajes = get_flashed_messages(with_categories=true) %} {%
            for categoria, mensaje in mensajes %}
            <div class="alert alert-{{ categoria }} py-2">{{ mensaje }}</div>
            {% endfor %} {% endwith %}

            <form method="POST">
              <div class="mb-3">
                <label class="form-label">Usuario</label>
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="bi bi-person"></i
                  ></span>
                  <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Tu usuario"
                    required
                    autofocus
                  />
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="bi bi-lock"></i
                  ></span>
                  <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Tu contraseña"
                    required
                  />
                </div>
              </div>
              <button type="submit" class="btn btn-dark w-100 py-2">
                <i class="bi bi-box-arrow-in-right"></i> Ingresar
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
